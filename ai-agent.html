<head>

<style>
:root{--gold:#D4A017;--gold-light:#F5C842;--dark:#020610;--text:#e8e8ff;--text-dim:#8898cc;--green:#4ade80;--blue:#60a5fa;--red:#f87171;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 55% at 50% 50%,#0a2a6e 0%,#061440 35%,#020818 65%,#000510 100%);pointer-events:none;z-index:0;}

header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:62px;background:rgba(2,6,20,0.97);border-bottom:1px solid rgba(212,160,23,0.3);}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;font-family:'Cinzel',serif;font-weight:900;font-size:1.1rem;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#c8920a,#f5c842);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#000;font-weight:900;}
.logo span:first-of-type{color:var(--gold-light);}.logo span:last-of-type{color:#fff;}
.agent-badge{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);padding:.3rem .8rem;border-radius:20px;display:flex;align-items:center;gap:.4rem;}
.agent-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.back-btn{color:var(--text-dim);text-decoration:none;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(60,120,255,.2);padding:.3rem .8rem;border-radius:6px;transition:all .2s;}
.back-btn:hover{color:#93c5fd;border-color:var(--blue);}

.chat-wrap{position:relative;z-index:1;flex:1;max-width:860px;width:100%;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}

.quick-topics{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.5rem;}
.topic-btn{background:rgba(60,120,255,.08);border:1px solid rgba(60,120,255,.2);color:#93c5fd;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .8rem;border-radius:20px;cursor:pointer;transition:all .2s;}
.topic-btn:hover{background:rgba(60,120,255,.18);border-color:var(--blue);}

.messages{flex:1;display:flex;flex-direction:column;gap:.8rem;overflow-y:auto;padding:.5rem 0;min-height:400px;max-height:60vh;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(212,160,23,.3);border-radius:3px;}

.msg{display:flex;gap:.8rem;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;}
.msg-avatar.bot{background:linear-gradient(135deg,#c8920a,#f5c842);color:#000;font-weight:900;}
.msg-avatar.user{background:rgba(96,165,250,.2);border:1px solid rgba(96,165,250,.3);color:var(--blue);}
.msg-bubble{max-width:75%;padding:.8rem 1.1rem;border-radius:16px;font-size:.88rem;line-height:1.6;}
.msg.bot .msg-bubble{background:rgba(5,15,50,.9);border:1px solid rgba(60,120,255,.2);border-radius:4px 16px 16px 16px;color:var(--text);}
.msg.user .msg-bubble{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);border-radius:16px 4px 16px 16px;color:var(--text);}
.msg-bubble b{color:var(--gold-light);}
.msg-bubble a{color:var(--blue);text-decoration:none;}

.typing{display:flex;align-items:center;gap:.4rem;padding:.6rem 1rem;}
.typing span{width:7px;height:7px;background:var(--text-dim);border-radius:50%;animation:bounce .9s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

.input-row{display:flex;gap:.7rem;align-items:flex-end;}
.input-box{flex:1;background:rgba(5,15,50,.8);border:1px solid rgba(60,120,255,.25);border-radius:12px;padding:.75rem 1rem;font-family:'Crimson Text',serif;font-size:.9rem;color:var(--text);resize:none;outline:none;transition:border-color .2s;min-height:48px;max-height:120px;}
.input-box:focus{border-color:rgba(96,165,250,.5);}
.input-box::placeholder{color:var(--text-dim);}
.send-btn{background:linear-gradient(135deg,#c8920a,#e8b020);color:#000;border:none;width:48px;height:48px;border-radius:12px;font-size:1.1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(212,160,23,.5);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<header>
  <a href="casino.html" class="back-btn">&#8592; Casino</a>
  <a href="index.html" class="logo"><div class="logo-icon">&#8383;</div><span>Crypto</span><span>Kasino</span></a>
  <div class="agent-badge"><div class="agent-dot"></div>AI Agent Online</div>
</header>

<div class="chat-wrap">
  <div class="quick-topics" id="quickTopics">
    <button class="topic-btn" onclick="askTopic('How do I deposit BTC?')">&#128176; Deposit BTC</button>
    <button class="topic-btn" onclick="askTopic('How does Provably Fair work?')">&#9989; Provably Fair</button>
    <button class="topic-btn" onclick="askTopic('What games do you have?')">&#127920; Games</button>
    <button class="topic-btn" onclick="askTopic('How does the VIP program work?')">&#128081; VIP Program</button>
    <button class="topic-btn" onclick="askTopic('How do I withdraw BTC?')">&#128200; Withdrawals</button>
    <button class="topic-btn" onclick="askTopic('What is the welcome bonus?')">&#127873; Welcome Bonus</button>
    <button class="topic-btn" onclick="askTopic('How does the affiliate program work?')">&#129309; Affiliate</button>
    <button class="topic-btn" onclick="askTopic('Is CryptoKasino safe and fair?')">&#128737; Safety</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea class="input-box" id="userInput" placeholder="Ask anything about CryptoKasino..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are the official AI support agent for CryptoKasino (www.cryptokasino.io) — a premium Bitcoin casino. You know everything about the casino and answer in a helpful, friendly, professional tone. Always answer in the same language the user writes in.

CASINO FACTS:
- Website: www.cryptokasino.io
- Currency: Bitcoin (BTC) only
- Server: Hetzner CPX32 VPS (4 vCPU, 8GB RAM) + Supabase cloud DB
- 16 games + Sports Betting

GAMES AVAILABLE:
Crash, Vegas Slots, Roulette, Texas Hold'em Poker, Dice, Live Tables, Blackjack, Plinko, Mines, Crazy Time, Wheel of Fortune, Jackpot Slots, Baccarat, Craps, Keno, HiLo, Sports Betting
- All game logic runs on server (cannot be cheated)
- House edge: ~5% (configurable per game)
- RTP: ~95%
- Min bet: 0.0001 BTC, Max bet: 0.1–10 BTC (varies by game)

DEPOSITS:
- Each player gets a unique Bitcoin deposit address (HD Wallet BIP44)
- Deposits confirmed after 1 blockchain confirmation
- No minimum deposit amount
- Funds appear instantly after confirmation

WITHDRAWALS:
- Withdraw directly to any Bitcoin address
- Minimum withdrawal: 0.001 BTC
- Fixed fee: 0.00005 BTC (network fee)
- Rate limit: 1 withdrawal per 60 seconds
- Processing: instant (automated)

PROVABLY FAIR:
- Every bet uses SHA-256 cryptographic verification
- Each bet records: server_seed, server_seed_hash, client_seed, nonce
- Players can verify any bet result on verify.html
- Players can change their client seed anytime in their profile
- This proves we cannot manipulate results

WELCOME BONUS:
- 50% match on first deposit
- Maximum bonus: 0.001 BTC
- Automatically credited after first deposit
- No wagering requirements mentioned (player should check terms)
- Example: deposit 0.001 BTC → get +0.0005 BTC bonus = 0.0015 BTC total

VIP PROGRAM (5 tiers):
1. Bronze: 5% cashback — from 0.1 BTC wagered
2. Silver: 10% cashback — from 0.5 BTC wagered
3. Gold: 15% cashback — from 2.0 BTC wagered
4. Diamond: 20% cashback — from 5.0 BTC wagered
5. Royal: 25% cashback + personal manager — from 10.0 BTC wagered
VIP level upgrades automatically based on total wagered amount.

AFFILIATE PROGRAM:
- 25% commission on referred players' losses
- Unique referral link for each affiliate
- Track earnings in affiliate dashboard
- Payouts processed on Fridays

JACKPOT:
- Progressive jackpot that grows with every bet
- Contribution: 0.5% of each bet goes to jackpot
- Current jackpot: ~21 BTC (grows continuously)

SPORTS BETTING:
- Live sports betting available
- Markets: home win, draw, away win, over 2.5, BTTS, home HT
- Odds: 1.72x to 3.80x
- Parlay bets supported (accumulator)

SECURITY:
- All API calls use HTTPS (SSL/TLS)
- JWT authentication for all player actions
- Server-side game logic (cannot be manipulated from browser)
- Rate limiting on withdrawals and API calls
- HD Wallet with separate casino reserve

RESPONSIBLE GAMBLING:
- Players can set deposit limits
- Self-exclusion available
- Cool-off periods available
- 18+ only

CONTACT/SUPPORT:
- AI Agent (this chat) — 24/7
- Email support available

LICENSE:
- Currently operating without license (pre-launch)
- Anjouan gaming license planned (€17,828/year)

DO NOT:
- Promise specific payouts or guarantee winnings
- Provide investment advice
- Share internal server credentials or API keys
- Make promises about license status

If asked about something you don't know, be honest and suggest contacting support via email.`;

const API_URL = 'https://api.anthropic.com/v1/messages';
let isTyping = false;
let conversationHistory = [];

function addMessage(role, content) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const isBot = role === 'bot';
  div.innerHTML = \`
    <div class="msg-avatar \${role}">\${isBot ? '&#8383;' : '&#128100;'}</div>
    <div class="msg-bubble">\${content}</div>
  \`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = \`
    <div class="msg-avatar bot">&#8383;</div>
    <div class="msg-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  \`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/• /g, '&#8226; ')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  conversationHistory.push({ role: 'user', content: text });

  isTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    hideTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', formatResponse(reply));
    } else {
      addMessage('bot', 'Sorry, I encountered an error. Please try again.');
    }
  } catch (e) {
    hideTyping();
    addMessage('bot', 'Connection error. Please check your internet connection and try again.');
  }

  isTyping = false;
  sendBtn.disabled = false;
}

function askTopic(question) {
  document.getElementById('userInput').value = question;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

addMessage('bot', 'Hello! I\'m the <b>CryptoKasino AI Agent</b> — I know everything about our casino.<br><br>I can help you with deposits, withdrawals, games, bonuses, Provably Fair, VIP program, and anything else. What would you like to know?');
</script>
</body>
</html>
