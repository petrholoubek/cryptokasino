DICE:

MINES:
- Grid of 25 tiles — hidden gems and mines
- Click tiles to reveal gems and grow your multiplier
- Hit a mine = lose entire bet

PLINKO:
- Drop a ball from the top of a pyramid of pegs

- Choose risk level: Low / Medium / High
- Higher risk = bigger potential wins and losses
- Multipliers range from 0.2x to 1000x

ROULETTE:
- European Roulette — 37 numbers (0-36)
- Bet on: number, color (red/black), odd/even, dozens, columns
- Single number pays 35x | Red/Black pays 1x
- House edge: 2.7%

BLACKJACK:
- Goal: get closer to 21 than dealer without going over
- Actions: Hit, Stand, Double Down, Split, Surrender
- Blackjack pays 3:2
- Dealer stands on 17
- Best RTP: 99.6% with optimal strategy

POKER (Texas Hold'em):
- 2 hole cards + 5 community cards
- Best 5-card hand wins the pot
- Betting rounds: Pre-flop, Flop, Turn, River
- Hand rankings: Royal Flush > Straight Flush > Four of a Kind > Full House > Flush > Straight > Three of a Kind > Two Pair > Pair > High Card

BACCARAT:
- Bet on Player, Banker or Tie
- Cards dealt to both sides — closest to 9 wins
- Banker bet: 1:1 (5% commission) | Player bet: 1:1 | Tie: 8:1
- Aces = 1, 10/J/Q/K = 0, others = face value

WHEEL OF FORTUNE:
- Spin the wheel and win the multiplier it lands on
- Multipliers: 1x, 2x, 5x, 10x, 20x, 50x, 100x
- Higher multipliers appear less frequently

KENO:
- Pick 1-10 numbers from 1-80
- 20 numbers drawn randomly
- More matches = higher payout
- 10 matches on 10 picks = massive jackpot

CRAPS:
- Roll two dice — bet on outcome
- Pass Line: win on 7/11, lose on 2/3/12
- Don't Pass: opposite of Pass Line
- Come/Don't Come, Place bets, Hardways available

HILO:
- One card shown — guess if next card is Higher or Lower
- Correct guess multiplies your bet
- Keep going or cash out anytime
- Wrong guess = lose bet

CRAZY TIME:
- Live game show with wheel spins
- 4 bonus games: Crazy Time, Cash Hunt, Pachinko, Coin Flip
- Multipliers up to 20,000x possible

JACKPOT SLOTS:
- Progressive jackpot grows with every bet (0.5% contribution)
- Spin reels — matching symbols win
- Free spins, wilds, scatter symbols
- Jackpot triggered randomly — anyone can win anytime

SPORTS BETTING:
- Pre-match and live betting
- Select event → choose market → enter stake → confirm bet
- Parlay: combine multiple bets for higher odds
- Cash out available on live bets
- Markets: 1X2, Over/Under, BTTS, Handicap, Half-time

const API_URL = 'https://api.anthropic.com/v1/messages';
let isTyping = false;
let conversationHistory = [];

function addMessage(role, content) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const isBot = role === 'bot';
  div.innerHTML = `
    <div class="msg-avatar ${role}">${isBot ? '&#8383;' : '&#128100;'}</div>
    <div class="msg-bubble">${content}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar bot">&#8383;</div>
    <div class="msg-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/━+/g, '<hr style="border:none;border-top:1px solid rgba(60,120,255,0.2);margin:0.5rem 0;">')
    .replace(/• /g, '&#8226; ')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  conversationHistory.push({ role: 'user', content: text });

  isTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    hideTyping();

    if (data.content && data.content[0]) {
      const reply = data.content[0].text;
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('bot', formatResponse(reply));
    } else {
      addMessage('bot', 'Sorry, I encountered an error. Please try again.');
    }
  } catch (e) {
    hideTyping();
    addMessage('bot', 'Connection error. Please check your internet connection and try again.');
  }

  isTyping = false;
  sendBtn.disabled = false;
}

function askTopic(question) {
  document.getElementById('userInput').value = question;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
