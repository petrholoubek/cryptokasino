<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile – CryptoKasino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">

<!-- PNG fallback -->
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">

<!-- Apple (iPhone) -->
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">

<!-- PWA manifest -->
<link rel="manifest" href="/site.webmanifest">

<!-- Theme color (mobilní horní lišta) -->
<meta name="theme-color" content="#7a0000">
<style>
:root{--gold:#D4A017;--gold-light:#F5C842;--gold-glow:rgba(212,160,23,.6);--dark:#0a0700;--text:#e8d5a0;--text-dim:#8a7a50;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,160,23,.18) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* HEADER */
header{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:62px;background:rgba(8,6,1,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,.22);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.7),rgba(255,255,255,.4),rgba(212,160,23,.7),transparent);}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;font-family:'Cinzel',serif;font-weight:900;font-size:1.1rem;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#c8920a,#f5c842);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#000;font-weight:900;}
.logo span:first-of-type{color:var(--gold-light);}.logo span:last-of-type{color:#fff;}
.header-right{display:flex;align-items:center;gap:.8rem;}
.btn-dep{background:linear-gradient(135deg,#c8920a,#e8b020);color:#000;border:none;padding:.42rem 1.1rem;border-radius:6px;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;cursor:pointer;text-decoration:none;}
.btn-login{background:transparent;color:var(--text-dim);border:1px solid rgba(212,160,23,.25);padding:.42rem 1rem;border-radius:6px;font-family:'Cinzel',serif;font-size:.68rem;cursor:pointer;text-decoration:none;}
.btc-bal{font-family:'Cinzel',serif;font-size:.8rem;color:var(--green);background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.22);padding:.3rem .8rem;border-radius:6px;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--gold);border-radius:2px;}
.mobile-menu{display:none;position:fixed;top:62px;left:0;right:0;background:rgba(8,6,1,.99);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,.2);z-index:199;padding:1rem 1.5rem 1.5rem;flex-direction:column;}
.mobile-menu.open{display:flex;}
.mobile-menu a{font-family:'Cinzel',serif;font-size:.85rem;color:var(--text-dim);text-decoration:none;padding:.9rem 0;border-bottom:1px solid rgba(212,160,23,.08);}
.mobile-menu-btns{display:flex;gap:.8rem;margin-top:1.2rem;}

/* PAGE */
.page{position:relative;z-index:2;max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* HERO CARD */
.profile-hero{background:linear-gradient(135deg,rgba(212,160,23,.12),rgba(120,60,0,.2));border:1px solid rgba(212,160,23,.3);border-radius:20px;padding:2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.8rem;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,var(--gold-light),transparent);}
.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#c8920a,#f5c842);display:flex;align-items:center;justify-content:center;font-size:2.2rem;flex-shrink:0;box-shadow:0 0 30px rgba(212,160,23,.5);}
.profile-info{flex:1;}
.profile-name{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:var(--gold-light);}
.profile-email{font-size:.82rem;color:var(--text-dim);margin-top:.2rem;}
.profile-vip{display:inline-flex;align-items:center;gap:.4rem;background:rgba(168,85,247,.15);border:1px solid rgba(168,85,247,.3);border-radius:20px;padding:.2rem .7rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:#c084fc;margin-top:.5rem;}
.profile-actions{display:flex;gap:.7rem;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,#c8920a,#e8b020);color:#000;border:none;padding:.6rem 1.3rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-primary:hover{box-shadow:0 0 20px rgba(212,160,23,.6);}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid rgba(255,255,255,.1);padding:.6rem 1.3rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.72rem;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-secondary:hover{border-color:rgba(212,160,23,.3);color:var(--gold);}
.btn-danger{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.25);padding:.6rem 1.3rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.72rem;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:rgba(248,113,113,.18);}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.5rem;}
.stat-card{background:rgba(12,9,2,.92);border:1px solid rgba(212,160,23,.15);border-radius:14px;padding:1.1rem;text-align:center;}
.stat-icon{font-size:1.6rem;margin-bottom:.4rem;}
.stat-lbl{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);}
.stat-val{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--gold-light);margin-top:.3rem;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.purple{color:var(--purple);}

/* SECTION */
.section{background:rgba(12,9,2,.92);border:1px solid rgba(212,160,23,.14);border-radius:16px;overflow:hidden;margin-bottom:1.2rem;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.3rem;border-bottom:1px solid rgba(212,160,23,.1);}
.section-title{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(212,160,23,.8);}

/* BET HISTORY TABLE */
.bet-table{width:100%;}
.bet-hdr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:.65rem 1.3rem;background:rgba(212,160,23,.04);font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.bet-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:.6rem 1.3rem;border-top:1px solid rgba(255,255,255,.025);align-items:center;transition:background .2s;}
.bet-row:hover{background:rgba(212,160,23,.03);}
.bet-game{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--gold);text-transform:capitalize;}
.bet-amount{font-size:.72rem;color:var(--text-dim);}
.bet-multi{font-family:'Cinzel',serif;font-size:.72rem;color:var(--text-dim);}
.bet-profit{font-family:'Cinzel',serif;font-size:.74rem;font-weight:700;text-align:right;}
.bet-profit.win{color:var(--green);}
.bet-profit.lose{color:var(--red);}
.bet-time{font-size:.65rem;color:var(--text-dim);}
.empty-state{padding:2.5rem;text-align:center;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.75rem;}

/* DEPOSIT HISTORY */
.dep-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:.6rem 1.3rem;border-top:1px solid rgba(255,255,255,.025);align-items:center;}
.dep-hdr{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:.65rem 1.3rem;background:rgba(212,160,23,.04);font-family:'Cinzel',serif;font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);}
.dep-status{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;display:inline-block;}
.dep-status.confirmed{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.dep-status.pending{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.3);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:2.5rem;gap:.8rem;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.75rem;}
.spinner{width:20px;height:20px;border:2px solid rgba(212,160,23,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* NOT LOGGED IN */
.not-logged{text-align:center;padding:4rem 2rem;}
.not-logged-icon{font-size:4rem;margin-bottom:1rem;}
.not-logged-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--gold-light);margin-bottom:.6rem;}
.not-logged-sub{font-size:.88rem;color:var(--text-dim);margin-bottom:2rem;}

footer{border-top:1px solid rgba(212,160,23,.1);padding:2rem;text-align:center;font-size:.75rem;color:var(--text-dim);}

@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr;}.profile-hero{flex-direction:column;text-align:center;}.profile-actions{justify-content:center;}}
@media(max-width:640px){header{padding:0 1rem;}.btc-bal,.btn-login,.btn-dep{display:none;}.hamburger{display:flex;}.page{padding:1rem .8rem 3rem;}.bet-hdr,.bet-row{grid-template-columns:1fr 1fr 1fr;}.dep-hdr,.dep-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo"><div class="logo-icon">₿</div><span>Crypto</span><span>Kasino</span></a>
  <div class="header-right">
    <span class="btc-bal" id="headerBal">0.00000000 BTC</span>
    <a href="deposit.html" class="btn-dep">Deposit</a>
    <a href="login.html" class="btn-login">Login</a>
    <div class="hamburger" id="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')"><span></span><span></span><span></span></div>
  </div>
</header>
<div class="mobile-menu" id="mobileMenu">
  <a href="casino.html">🎰 Casino</a>
  <a href="deposit.html">₿ Deposit</a>
  <a href="login.html">🔐 Login</a>
  <div class="mobile-menu-btns">
    <a href="casino.html" class="btn-primary">Play Now</a>
  </div>
</div>

<div class="page" id="pageContent">
  <div class="loading"><div class="spinner"></div>Loading profile...</div>
</div>

<footer><p>© 2026 CryptoKasino · 18+ · Play Responsibly · <a href="casino.html" style="color:var(--gold)">← Casino</a></p></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
const SB_URL = 'https://cckybsbawnsbvxwloxcr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNja3lic2Jhd25zYnZ4d2xveGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMzE5NjAsImV4cCI6MjA5MDkwNzk2MH0.M-hl7VXWF52jfnkg3zu78yiY_CT4yn3ljefej0BN2oY';

function f8(n){return parseFloat(n||0).toFixed(8);}
function f5(n){return parseFloat(n||0).toFixed(5);}
function timeAgo(ts){
  const d=Math.floor((Date.now()-new Date(ts))/1000);
  if(d<60)return d+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
}

async function loadProfile(){
  const {createClient}=supabase;
  const sb=createClient(SB_URL,SB_KEY);
  const {data:{session}}=await sb.auth.getSession();

  const page=document.getElementById('pageContent');

  if(!session){
    page.innerHTML=`
      <div class="not-logged">
        <div class="not-logged-icon">🔐</div>
        <div class="not-logged-title">Please Sign In</div>
        <div class="not-logged-sub">You need to be logged in to view your profile.</div>
        <a href="login.html" class="btn-primary" style="display:inline-block">Sign In / Register</a>
      </div>`;
    return;
  }

  // Nacti profil
  const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(!prof){page.innerHTML='<div class="empty-state">Profile not found.</div>';return;}

  // Nacti posledni sazky
  const {data:bets}=await sb.from('bets').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}).limit(15);

  // Nacti deposity
  const {data:deps}=await sb.from('deposits').select('*').eq('user_id',session.user.id).order('created_at',{ascending:false}).limit(10);

  // Spocitej statistiky
  const totalBets=bets?.length||0;
  const totalWins=bets?.filter(b=>parseInt(b.profit_satoshi)>0).length||0;
  const winRate=totalBets>0?Math.round(totalWins/totalBets*100):0;
  const totalProfit=bets?.reduce((s,b)=>s+parseInt(b.profit_satoshi||0),0)||0;

  const vipIcons={none:'👤',bronze:'🥉',silver:'🥈',gold:'🥇',platinum:'💎',diamond:'💠'};
  const vipIcon=vipIcons[prof.vip_level]||'👤';

  // Render
  page.innerHTML=`
    <!-- HERO -->
    <div class="profile-hero">
      <div class="avatar">${vipIcon}</div>
      <div class="profile-info">
        <div class="profile-name">${prof.username||'Player'}</div>
        <div class="profile-email">${session.user.email}</div>
        <div class="profile-vip">⭐ ${(prof.vip_level||'none').toUpperCase()} MEMBER</div>
      </div>
      <div class="profile-actions">
        <a href="deposit.html" class="btn-primary">₿ Deposit</a>
        <a href="casino.html" class="btn-secondary">🎰 Play</a>
        <button class="btn-danger" onclick="window.CK&&window.CK.logout()">🚪 Logout</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">₿</div>
        <div class="stat-lbl">Balance</div>
        <div class="stat-val green">${f8(prof.balance)} BTC</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📥</div>
        <div class="stat-lbl">Total Deposited</div>
        <div class="stat-val">${f8(prof.total_deposited)} BTC</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎲</div>
        <div class="stat-lbl">Win Rate</div>
        <div class="stat-val ${winRate>=50?'green':'red'}">${winRate}%</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-lbl">P/L (All Time)</div>
        <div class="stat-val ${totalProfit>=0?'green':'red'}">${totalProfit>=0?'+':''}${f5(totalProfit/1e8)} BTC</div>
      </div>
    </div>

    <!-- BET HISTORY -->
    <div class="section">
      <div class="section-hdr">
        <div class="section-title">🎯 Recent Bets</div>
        <div style="font-family:'Cinzel',serif;font-size:.6rem;color:var(--text-dim);">Last 15 real bets</div>
      </div>
      ${totalBets===0
        ? '<div class="empty-state">No bets yet. Start playing!</div>'
        : `<div class="bet-hdr"><span>Game</span><span>Bet</span><span>Multi</span><span>Profit</span><span>Time</span></div>
           <div>${(bets||[]).map(b=>{
             const profit=parseInt(b.profit_satoshi||0);
             const win=profit>0;
             return`<div class="bet-row">
               <span class="bet-game">${b.game}</span>
               <span class="bet-amount">${f5(b.bet_satoshi/1e8)}</span>
               <span class="bet-multi">${parseFloat(b.multiplier||0).toFixed(2)}×</span>
               <span class="bet-profit ${win?'win':'lose'}">${win?'+':''}${f5(profit/1e8)}</span>
               <span class="bet-time">${timeAgo(b.created_at)}</span>
             </div>`;
           }).join('')}</div>`
      }
    </div>

    <!-- DEPOSIT HISTORY -->
    <div class="section">
      <div class="section-hdr">
        <div class="section-title">📥 Deposit History</div>
        <a href="deposit.html" style="font-family:'Cinzel',serif;font-size:.6rem;color:var(--gold);text-decoration:none;">+ New Deposit</a>
      </div>
      ${!deps||deps.length===0
        ? '<div class="empty-state">No deposits yet. <a href="deposit.html" style="color:var(--gold)">Make your first deposit →</a></div>'
        : `<div class="dep-hdr"><span>Amount</span><span>Status</span><span>TX</span><span>Date</span></div>
           <div>${deps.map(d=>`<div class="dep-row">
             <span style="font-family:'Cinzel',serif;font-size:.75rem;color:var(--green);">+${f8(d.amount_btc)} BTC</span>
             <span><span class="dep-status ${d.status}">${d.status}</span></span>
             <span style="font-family:monospace;font-size:.62rem;color:var(--text-dim);">${d.txid?d.txid.substring(0,12)+'...':'—'}</span>
             <span style="font-size:.65rem;color:var(--text-dim);">${timeAgo(d.created_at)}</span>
           </div>`).join('')}</div>`
      }
    </div>
  `;

  // Aktualizuj header balance
  const hb=document.getElementById('headerBal');
  if(hb)hb.textContent=f8(prof.balance)+' BTC';
}

loadProfile();
</script>
</body>
</html>
