*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 55% at 50% 50%, #0a2a6e 0%, #061440 35%, #020818 65%, #000510 100%);pointer-events:none;z-index:0;}

nav{display:flex;gap:2rem;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;}
nav a{color:var(--text-dim);text-decoration:none;transition:color .2s;}nav a:hover{color:var(--gold-light);}

.btn-dep{background:linear-gradient(135deg,#c8920a,#e8b020);color:#000;border:none;padding:.42rem 1.1rem;border-radius:6px;font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;cursor:pointer;text-decoration:none;}

.bet-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;padding:.6rem 1.3rem;border-top:1px solid rgba(255,255,255,.025);align-items:center;}
.bet-row:hover{background:rgba(60,120,255,.05);}
.dep-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:.6rem 1.3rem;border-top:1px solid rgba(255,255,255,.025);align-items:center;}
.bet-game{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--gold);text-transform:capitalize;}

.dep-status{font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;padding:.18rem .55rem;border-radius:20px;display:inline-block;}
.dep-status.confirmed{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3);}
.dep-status.pending{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.3);}
.empty-state{padding:2.5rem;text-align:center;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.75rem;}
.loading{display:flex;align-items:center;justify-content:center;padding:2.5rem;gap:.8rem;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.75rem;}
.spinner{width:20px;height:20px;border:2px solid rgba(60,120,255,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.not-logged{text-align:center;padding:4rem 2rem;}
.not-logged-icon{font-size:4rem;margin-bottom:1rem;}
.not-logged-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--gold-light);margin-bottom:.6rem;}
.not-logged-sub{font-size:.88rem;color:var(--text-dim);margin-bottom:2rem;}

.vip-bar-bg{background:rgba(255,255,255,.06);border-radius:20px;height:8px;margin:.6rem 0 .3rem;overflow:hidden;}
.vip-bar{height:100%;border-radius:20px;transition:width 1s ease;}
.vip-bar-labels{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:.55rem;color:var(--text-dim);margin-top:.2rem;}
footer{position:relative;z-index:2;border-top:1px solid rgba(60,120,255,.15);padding:2rem;text-align:center;font-size:.75rem;color:var(--text-dim);}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr;}.profile-hero{flex-direction:column;text-align:center;}.profile-actions{justify-content:center;}nav{display:none;}}

</style>
</head>

<script>

async function pfLoadSeeds(){
  try{
    var sess = await window.CK?.getSession?.();
    if(!sess)return;
    var r = await fetch('https://api.cryptokasino.io/api/game/seeds',{headers:{'Authorization':'Bearer '+sess.access_token}});
    var d = await r.json();
    if(d.ok){
      var hEl = document.getElementById('pfServerHash');
      var cEl = document.getElementById('pfClientSeed');
      if(hEl)hEl.textContent = d.serverSeedHash.slice(0,32)+'...';
      if(cEl)cEl.textContent = d.clientSeed;
    }
  }catch(e){}
}
async function pfChangeClientSeed(){
  var ns = prompt('Nový Client Seed (prázdné = náhodný):');
  if(ns===null)return;
  var sess = await window.CK?.getSession?.();
  if(!sess)return;
  await fetch('https://api.cryptokasino.io/api/game/seeds/rotate',{method:'POST',headers:{'Authorization':'Bearer '+sess.access_token,'Content-Type':'application/json'},body:JSON.stringify({clientSeed:ns||undefined})});
  pfLoadSeeds();
  alert('✅ Client Seed změněn!');
}
setTimeout(pfLoadSeeds, 2000);


// Injektuj PF sekci do stranky
function injectPFSection() {
  var existing = document.getElementById('pfSection');
  if (existing) return;
  var page = document.getElementById('pageContent');
  if (!page) return;
  var div = document.createElement('div');
  div.innerHTML = '\n<div id="pfSection" style="background:rgba(5,15,50,.9);border:1px solid rgba(74,222,128,.2);border-radius:16px;padding:1.5rem;margin-top:1.5rem;">\n  <div style="font-family:\'Cinzel\',serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#4ade80;margin-bottom:1rem;display:flex;align-items:center;gap:.8rem;">\n    &#9989; Provably Fair\n    <div style="flex:1;height:1px;background:linear-gradient(to right,rgba(74,222,128,.4),transparent);"></div>\n  </div>\n  <p style="font-size:.85rem;color:var(--text-dim);line-height:1.7;margin-bottom:1.2rem;">Every game result is cryptographically verifiable using SHA-256. We cannot manipulate results.</p>\n  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;">\n    <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:.9rem;">\n      <div style="font-family:\'Cinzel\',serif;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.4rem;">Server Seed Hash</div>\n      <div id="pfServerHash" style="font-family:monospace;font-size:.68rem;color:#93c5fd;word-break:break-all;">Loading...</div>\n    </div>\n    <div style="background:rgba(0,0,0,.2);border-radius:8px;padding:.9rem;">\n      <div style="font-family:\'Cinzel\',serif;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.4rem;">Client Seed</div>\n      <div id="pfClientSeed" style="font-family:monospace;font-size:.68rem;color:#93c5fd;word-break:break-all;">Loading...</div>\n    </div>\n  </div>\n  <div style="display:flex;gap:.8rem;flex-wrap:wrap;">\n    <a href="verify.html" style="font-family:\'Cinzel\',serif;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4ade80;text-decoration:none;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);padding:.55rem 1.2rem;border-radius:8px;">&#9989; Verify Results</a>\n    <button onclick="pfChangeClientSeed()" style="font-family:\'Cinzel\',serif;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#60a5fa;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);padding:.55rem 1.2rem;border-radius:8px;cursor:pointer;">&#128260; Change Client Seed</button>\n  </div>\n</div>';
  page.appendChild(div.firstElementChild);
}

setTimeout(function(){injectPFSection();pfLoadSeeds();}, 2500);
</script>
